<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SummitCRM — Architecture Map</title>
<style>
  :root {
    --bg: #0F0F0F;
    --panel: #161616;
    --panel-2: #1c1c1c;
    --border: #2a2a2a;
    --text: #e8e8e8;
    --muted: #8a8a8a;
    --client: #4ea1ff;
    --route: #7bd389;
    --service: #c792ea;
    --db: #ffb86b;
    --external: #ff6b9d;
    --critical: #ff3860;
    --accent: #f5b942;
    --accent-2: #ff7a45;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg);
    color: var(--text);
    font: 13px/1.45 -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
  }
  #app { display: grid; grid-template-columns: 1fr 400px; height: 100vh; }
  #canvas-wrap { position: relative; display: flex; flex-direction: column; background: var(--bg); overflow: hidden; }
  #header {
    flex-shrink: 0;
    padding: 12px 16px; background: var(--bg);
    border-bottom: 1px solid var(--border);
    z-index: 10;
  }
  #scroll-area {
    flex: 1; overflow: auto; position: relative;
    background: var(--bg);
  }
  h1 { margin: 0 0 10px 0; font-size: 14px; font-weight: 600; letter-spacing: 0.2px; }
  h1 .muted { color: var(--muted); font-weight: 400; margin-left: 8px; }
  #chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    background: var(--panel); border: 1px solid var(--border); color: var(--muted);
    padding: 4px 10px; border-radius: 999px; font-size: 11px; cursor: pointer;
    transition: all .12s ease;
    user-select: none;
  }
  .chip:hover { color: var(--text); border-color: #444; }
  .chip.active { background: var(--accent); color: #1a1300; border-color: var(--accent); }
  #controls {
    position: absolute; bottom: 16px; left: 16px; z-index: 10;
    display: flex; gap: 6px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 4px;
  }
  .btn {
    background: transparent; color: var(--text);
    border: none; padding: 5px 10px; cursor: pointer;
    font: inherit; border-radius: 6px;
  }
  .btn:hover { background: var(--panel-2); }
  #legend {
    position: absolute; bottom: 16px; right: 16px; z-index: 10;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 10px; font-size: 11px; color: var(--muted);
    display: flex; gap: 12px; align-items: center;
  }
  .legend-swatch {
    display: inline-block; width: 16px; height: 3px; border-radius: 2px;
    vertical-align: middle; margin-right: 4px;
  }
  svg#graph { display: block; background: var(--bg); }
  svg#graph .cluster-rect { fill: rgba(255,255,255,0.015); stroke: var(--border); stroke-width: 1; rx: 12; }
  svg#graph .cluster-label { fill: var(--muted); font-size: 11px; letter-spacing: 1.2px; text-transform: uppercase; }
  svg#graph .node-rect { fill: var(--panel); stroke-width: 1.4; rx: 8; cursor: pointer; transition: filter .15s ease; }
  svg#graph .node-rect:hover { filter: brightness(1.4); }
  svg#graph .node-rect.dimmed { opacity: 0.2; }
  svg#graph .node-rect.selected { stroke-width: 3; }
  svg#graph .node-rect.critical { stroke-width: 2.2; }
  svg#graph .node-label { fill: var(--text); font-size: 12px; font-weight: 500; pointer-events: none; }
  svg#graph .node-sub { fill: var(--muted); font-size: 10px; pointer-events: none; }
  svg#graph .node-sub.dead { fill: var(--critical); font-style: italic; }
  svg#graph .edge { fill: none; stroke-width: 1.4; opacity: 0.55; transition: opacity .15s ease; }
  svg#graph .edge.dimmed { opacity: 0.05; }
  svg#graph .edge.highlight { opacity: 1; stroke-width: 2.2; }
  svg#graph .edge.critical { stroke: var(--critical); stroke-width: 2.2; opacity: 0.9; }
  svg#graph .edge.api { stroke: var(--accent-2); }
  svg#graph .edge.db { stroke: var(--db); }
  svg#graph .edge.mount { stroke: var(--client); }
  svg#graph .edge.normal { stroke: #555; }
  svg#graph .edge-label {
    fill: var(--muted); font-size: 9.5px; pointer-events: none;
    paint-order: stroke fill; stroke: var(--bg); stroke-width: 3; stroke-linejoin: round;
  }
  svg#graph .edge-label.dimmed { opacity: 0.15; }
  svg#graph .badge-fix { fill: #2d8c5a; }
  svg#graph .badge-bug { fill: var(--critical); }
  svg#graph .badge-text { fill: white; font-size: 9.5px; font-weight: 600; pointer-events: none; }
  #sidebar {
    background: var(--panel); border-left: 1px solid var(--border);
    overflow-y: auto; padding: 18px 18px 28px 18px;
  }
  #sidebar h2 { font-size: 14px; margin: 0 0 4px 0; font-weight: 600; }
  #sidebar .path { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px; color: var(--muted); word-break: break-all; }
  #sidebar .section-title { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; margin: 18px 0 6px 0; }
  #sidebar p.role { color: var(--text); margin: 8px 0 4px 0; font-size: 12.5px; }
  #sidebar p.plain { color: #c8c8c8; margin: 6px 0 0 0; font-size: 12.5px; line-height: 1.55; }
  #sidebar ul { margin: 4px 0 0 0; padding-left: 18px; }
  #sidebar li { font-size: 12px; margin: 3px 0; color: #d4d4d4; }
  #sidebar .tag-row { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 4px; }
  #sidebar .tag {
    background: var(--panel-2); border: 1px solid var(--border); color: var(--muted);
    padding: 2px 8px; border-radius: 4px; font-size: 10px;
  }
  #sidebar .edge-line { font-size: 12px; margin: 3px 0; color: #d4d4d4; }
  #sidebar .edge-line .arr { color: var(--muted); margin: 0 4px; }
  #sidebar .edge-line .what { color: var(--accent); font-family: ui-monospace, monospace; font-size: 11px; }
  #sidebar .fix { background: rgba(45, 140, 90, 0.12); border-left: 3px solid #2d8c5a; padding: 6px 8px; margin: 4px 0; font-size: 11.5px; border-radius: 4px; }
  #sidebar .bug { background: rgba(255, 56, 96, 0.10); border-left: 3px solid var(--critical); padding: 6px 8px; margin: 4px 0; font-size: 11.5px; border-radius: 4px; }
  #sidebar .bug .sev { font-weight: 600; text-transform: uppercase; font-size: 10px; margin-right: 6px; color: var(--critical); }
  #sidebar .empty { color: var(--muted); font-size: 11.5px; font-style: italic; }
  #findings { background: var(--panel-2); border-radius: 8px; padding: 12px; margin-top: 14px; border: 1px solid var(--border); }
  #findings .section-title { margin-top: 0; }
  #findings li { font-size: 12px; line-height: 1.55; margin: 6px 0; }
</style>
</head>
<body>
<div id="app">
  <div id="canvas-wrap">
    <div id="header">
      <h1>SummitCRM <span class="muted">— architecture map · 58 nodes · hover or click any node</span></h1>
      <div id="chips"></div>
    </div>
    <div id="scroll-area">
      <svg id="graph" width="1720" height="1480" viewBox="0 0 1720 1480" preserveAspectRatio="xMidYMid meet">
        <defs>
          <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="currentColor"/>
          </marker>
        </defs>
        <g id="root"></g>
      </svg>
    </div>
    <div id="controls">
      <button class="btn" id="fit-btn">Fit</button>
      <button class="btn" id="zoom-in">+</button>
      <button class="btn" id="zoom-out">−</button>
      <button class="btn" id="reset">Reset</button>
    </div>
    <div id="legend">
      <span><span class="legend-swatch" style="background:var(--critical)"></span>critical</span>
      <span><span class="legend-swatch" style="background:var(--accent-2)"></span>external</span>
      <span><span class="legend-swatch" style="background:var(--db)"></span>db</span>
      <span><span class="legend-swatch" style="background:var(--client)"></span>mount</span>
      <span><span class="legend-swatch" style="background:#555"></span>normal</span>
    </div>
  </div>
  <aside id="sidebar"></aside>
</div>

<script>
// ── Cluster columns ─────────────────────────────────────────────────────────
const clusters = [
  { id: 'client',   label: 'Client (browser)',  color: 'client',  x: 20,   y: 50,  w: 260, h: 1400 },
  { id: 'entry',    label: 'Server entry',      color: 'service', x: 300,  y: 50,  w: 200, h: 1400 },
  { id: 'routes',   label: 'API routes',        color: 'route',   x: 520,  y: 50,  w: 260, h: 1400 },
  { id: 'services', label: 'Services / libs',   color: 'service', x: 800,  y: 50,  w: 240, h: 1400 },
  { id: 'data',     label: 'Data (Postgres)',   color: 'db',      x: 1060, y: 50,  w: 240, h: 1400 },
  { id: 'external', label: 'External services', color: 'external',x: 1320, y: 50,  w: 200, h: 1400 },
];

// ── Node factory ────────────────────────────────────────────────────────────
const N = (id, cluster, label, sub, x, y, w, h, color, opts = {}) => ({
  id, cluster, label, sub, x, y, w, h, color, ...opts
});

// ── Nodes ───────────────────────────────────────────────────────────────────
const nodes = [
  // ── CLIENT ────────────────────────────────────────────────────────────────
  N('root-layout', 'client', 'app/layout.tsx', 'root shell', 40, 90, 220, 60, 'client', {
    role: 'Root Next.js layout: fonts, theme provider, global CSS.',
    plain: "The outermost wrapper every page in the app sits inside. Loads the design fonts and the dark/light theme.",
    path: 'app/layout.tsx',
    notes: ['Wraps every route in app/', 'Loads global Tailwind styles', 'Theme is dark by default'],
    tag: ['overview','all'],
  }),
  N('dashboard-layout', 'client', 'app/(dashboard)/layout.tsx', 'sidebar + header', 40, 170, 220, 60, 'client', {
    role: 'Authenticated app shell: sidebar nav, header, notification bell, theme toggle.',
    plain: 'The frame you see after logging in — the left nav and top bar. Wraps every screen inside the app.',
    path: 'app/(dashboard)/layout.tsx',
    notes: ['Mounts NotificationProvider → realtime channel', 'Renders <Sidebar /> + <Header />', 'Gates non-auth users'],
    tag: ['overview','all'],
  }),
  N('leads-page', 'client', 'app/(dashboard)/leads/page.tsx', 'SSR /leads', 40, 250, 220, 60, 'client', {
    role: 'Server component that reads URL filters, calls the page RPC, and hands rows to the client.',
    plain: "The leads list screen. Reads what you filtered/sorted from the URL, asks the database for that exact page of leads, and gives them to the browser to draw.",
    path: 'app/(dashboard)/leads/page.tsx:97',
    notes: [
      'line 97: default sort flipped to last_activity_at',
      'Calls RPC get_workspace_leads_page',
      'Returns 25/50/100/all per page',
    ],
    tag: ['overview','leads','all'],
  }),
  N('leads-client', 'client', 'app/(dashboard)/leads/leads-client.tsx', 'browser table', 40, 330, 220, 60, 'client', {
    role: 'Client component: bulk select, filters, status pills, sortable table, URL-state push.',
    plain: 'The interactive bits of the leads page — filters, bulk select, status buttons, the sortable columns.',
    path: 'app/(dashboard)/leads/leads-client.tsx',
    notes: [
      'line 89: default sort = last_activity_at',
      'Select-All-Matching sends filter spec, not IDs',
      'router.push on filter change to re-fetch',
    ],
    tag: ['overview','leads','all'],
  }),
  N('lead-detail', 'client', 'leads/[id]/lead-detail-client.tsx', 'full lead page', 40, 410, 220, 60, 'client', {
    role: 'Lead detail page client: profile, activity timeline, notes, calls, follow-ups.',
    plain: 'The big detail view when you click into one lead. Shows everything about that lead in tabs.',
    path: 'app/(dashboard)/leads/[id]/lead-detail-client.tsx',
    notes: ['Activity timeline shows notes with @mention chips', 'Inline edit for status / interest / state', 'Hosts the questionnaire'],
    tag: ['leads','notes','all'],
  }),
  N('lead-side-panel', 'client', 'lead-full-panel.tsx', 'side drawer', 40, 490, 220, 60, 'client', {
    role: 'Slide-out side panel: lighter version of the full lead detail page.',
    plain: 'The slide-out drawer that pops in from the right when you click a row on the leads list — same info as the full page, just floating.',
    path: 'components/leads/lead-full-panel.tsx',
    notes: ['z-index 50, portal-mounted', 'Fetches /api/leads/[id]/full', 'Shares NoteEditor + ActivityTimeline with detail page'],
    tag: ['leads','notes','all'],
  }),
  N('questionnaire-ui', 'client', 'detail/questionnaire.tsx', 'intake form + snapshot trigger', 40, 570, 220, 70, 'client', {
    role: 'Intake form for company details plus the "Email Snapshot" / "Open Outlook draft" / "Copy snapshot" buttons.',
    plain: 'The intake form on each lead where you answer questions about the company. The button that builds the AI snapshot email lives here.',
    path: 'components/leads/detail/questionnaire.tsx',
    notes: [
      'Click "Email Snapshot" → prepareSnapshotEmail (lib/intake-snapshot.ts)',
      'Shows amber "Template (AI down)" badge when AI fallback fired',
      'Save button anchored at the bottom of the form',
    ],
    tag: ['snapshot','overview','all'],
    critical: true,
  }),
  N('pipeline-page', 'client', 'pipeline/page.tsx', 'kanban board', 40, 660, 220, 60, 'client', {
    role: 'Kanban-style pipeline view: stages as columns, drag-drop to reassign.',
    plain: 'Sales pipeline. Each column is a stage; you drag leads between columns.',
    path: 'app/(dashboard)/pipeline/page.tsx',
    notes: ['Top N per stage from RPC get_pipeline_leads_json', '"+ N more" button per overflowing stage', 'Debounced server search'],
    tag: ['pipeline','all'],
  }),
  N('dashboard-page', 'client', 'dashboard/page.tsx', 'metrics + activity', 40, 740, 220, 60, 'client', {
    role: 'Home dashboard: KPI cards, calls today, overdue follow-ups, rep performance.',
    plain: 'The home screen with the big numbers — leads called today, conversions, calls vs target.',
    path: 'app/(dashboard)/dashboard/page.tsx',
    notes: ['8 metrics in one Promise.all', '<DashboardStats /> streams via Suspense', '"Leads Called Today" uses unique-lead RPC'],
    tag: ['overview','all'],
  }),
  N('analytics-page', 'client', 'analytics/page.tsx', '4 charts', 40, 820, 220, 60, 'client', {
    role: 'Analytics view: funnel, email metrics, time-series, rep performance.',
    plain: 'The reports screen with charts: who is converting, calls over time, per-rep stats.',
    path: 'app/(dashboard)/analytics/page.tsx',
    notes: ['Pulls from 4 aggregate RPCs', 'Day / Week / Month period toggle', 'Date stepper for historical views'],
    tag: ['analytics','all'],
  }),
  N('admin-page', 'client', 'admin/page.tsx', 'admin dashboard', 40, 900, 220, 60, 'client', {
    role: 'Admin overview: team stats, rep performance, AI usage, account health.',
    plain: 'Admin-only screen with team-wide stats and the AI cost log.',
    path: 'app/(dashboard)/admin/page.tsx',
    notes: ['Admin-gated (workspace_members.role check)', 'AI usage card shows MTD cost', 'Rep performance with Day/Week/Month nav'],
    tag: ['admin','all'],
  }),
  N('notif-bell', 'client', 'notification-bell.tsx', 'unified bell', 40, 980, 220, 60, 'client', {
    role: 'Header bell: activities at top (overdue / today / upcoming) + notifications below.',
    plain: 'The bell icon in the top bar. Shows overdue follow-ups, today\'s due items, and notifications like "@you on a note".',
    path: 'components/notifications/notification-bell.tsx',
    notes: ['Portal-rendered (escapes sticky header z-index)', 'One bell for reps + admins', 'FollowUpBell was deleted in this session'],
    tag: ['notifications','all'],
  }),
  N('notif-context', 'client', 'notification-context.tsx', 'realtime channel', 40, 1060, 220, 60, 'client', {
    role: 'React context: subscribes to Supabase realtime INSERTs on the notifications table.',
    plain: 'The piece that listens for new notifications and updates the bell instantly without needing a page refresh.',
    path: 'components/notifications/notification-context.tsx',
    notes: ['Channel filtered by user_id = auth.uid', 'Requires notifications table in supabase_realtime publication', 'Migration 20260512000014 enabled it'],
    tag: ['notifications','all'],
  }),
  N('import-wizard', 'client', 'leads/import/page.tsx', 'CSV upload wizard', 40, 1140, 220, 60, 'client', {
    role: 'Multi-step CSV import: upload → map columns → options → progress.',
    plain: 'The bulk-import wizard for uploading a CSV of leads.',
    path: 'app/(dashboard)/leads/import/page.tsx',
    notes: ['Drag-drop upload zone', 'Column → field mapping', 'Shows per-row errors after import'],
    tag: ['import','all'],
  }),

  // ── SERVER ENTRY ──────────────────────────────────────────────────────────
  N('middleware', 'entry', 'middleware.ts', 'auth gate + headers', 320, 90, 160, 60, 'service', {
    role: 'Next.js middleware: refresh Supabase session cookies, redirect unauth users, set security headers.',
    plain: 'A bouncer that runs on every request before it reaches the page. Confirms you\'re logged in and renews your session.',
    path: 'middleware.ts',
    notes: ['Wraps every /(dashboard) request', 'Calls lib/supabase/middleware.updateSession', 'Adds CSP + frame-options headers'],
    tag: ['overview','all'],
  }),
  N('supabase-server', 'entry', 'supabase/server.ts', 'createServerClient / Admin', 320, 170, 160, 60, 'service', {
    role: 'Server-side Supabase factories: createServerClient (RLS) + createAdminClient (service role).',
    plain: 'Two ways to talk to the database from the server: one that respects the logged-in user\'s permissions, and an admin one that can do anything.',
    path: 'lib/supabase/server.ts',
    notes: ['Used by every API route', 'Admin client bypasses RLS — handle with care', 'Reads SUPABASE_SERVICE_ROLE_KEY'],
    tag: ['overview','all'],
  }),
  N('supabase-mw', 'entry', 'supabase/middleware.ts', 'session refresher', 320, 250, 160, 60, 'service', {
    role: 'updateSession: refreshes auth cookies, returns next-response with cookies set.',
    plain: 'Helper used by the bouncer above — refreshes the cookie that keeps you logged in.',
    path: 'lib/supabase/middleware.ts',
    notes: ['Reads + rewrites sb-* cookies', 'Returns NextResponse with cookie deltas'],
    tag: ['overview','all'],
  }),
  N('supabase-client', 'entry', 'supabase/client.ts', 'browser client', 320, 330, 160, 60, 'service', {
    role: 'Browser-side Supabase client (RLS-aware, used by realtime + a few client mutations).',
    plain: 'The browser\'s connection to the database — used for live notifications and small updates from the page.',
    path: 'lib/supabase/client.ts',
    notes: ['Public anon key only', 'Used by notification-context realtime channel'],
    tag: ['overview','all'],
  }),

  // ── ROUTES ────────────────────────────────────────────────────────────────
  N('snapshot-route', 'routes', 'POST /api/ai/snapshot-email', 'admin-only · AI gen', 540, 90, 220, 70, 'route', {
    role: 'Auth + admin check, zod validate, call generateSnapshotEmail, await logUsage, return { subject, body }.',
    plain: 'The server endpoint that builds the AI version of the company snapshot when you click "Email Snapshot".',
    path: 'app/api/ai/snapshot-email/route.ts',
    notes: [
      'line 37: isAiEnabled() gate → 503 if envs missing',
      'line 57: admin role required',
      'line 66: generateSnapshotEmail → gpt-4o',
      'line 70: await logUsage (~50ms cost)',
    ],
    tag: ['snapshot','overview','all'],
    critical: true,
  }),
  N('leads-list-route', 'routes', '/api/leads', 'GET list · POST create', 540, 180, 220, 60, 'route', {
    role: 'List + create leads. Server-paginated via get_workspace_leads_page.',
    plain: 'The endpoint that fetches a page of leads, or creates a new one when you fill out the "new lead" form.',
    path: 'app/api/leads/route.ts',
    notes: ['Uses same RPC as the leads page', 'POST inserts + writes lead_created activity', 'Workspace-scoped via member lookup'],
    tag: ['leads','all'],
  }),
  N('lead-id-route', 'routes', '/api/leads/[id]', 'GET / PATCH / DELETE', 540, 260, 220, 60, 'route', {
    role: 'Single-lead CRUD. PATCH triggers status sync + activity log.',
    plain: 'The endpoint for one specific lead — used when you edit status, assign a rep, or delete a lead.',
    path: 'app/api/leads/[id]/route.ts',
    notes: ['BEFORE-UPDATE trigger may auto-log calls', 'contact_state / company_state merged into custom_fields', 'Soft-deletes via deleted_at'],
    tag: ['leads','all'],
  }),
  N('lead-full-route', 'routes', '/api/leads/[id]/full', 'aggregated detail', 540, 340, 220, 60, 'route', {
    role: 'Fetch lead + activities + notes + emails + follow-ups + calls + team in one parallel call.',
    plain: 'The endpoint that loads EVERYTHING about a single lead in one go, used by the side panel and the detail page.',
    path: 'app/api/leads/[id]/full/route.ts',
    notes: [
      'Returns 8 parallel result sets',
      'Notes now include assigned_to → @mention name',
      'Activities sorted newest-first',
    ],
    tag: ['leads','notes','all'],
  }),
  N('lead-notes-route', 'routes', '/api/leads/[id]/notes', 'POST · multi-assign', 540, 420, 220, 60, 'route', {
    role: 'Insert a note + fan out one mention notification per recipient. Role rules enforced.',
    plain: 'The endpoint for adding a note. If you @assign teammates, this is what sends them the bell notification.',
    path: 'app/api/leads/[id]/notes/route.ts',
    notes: [
      'Reps can only ping admins · admins can ping other admins + the assigned rep',
      'assigned_to accepts string | string[]',
      'Stores primary recipient in notes.assigned_to',
    ],
    tag: ['notes','all'],
  }),
  N('lead-calls-route', 'routes', '/api/leads/[id]/calls', 'POST log · sync status', 540, 500, 220, 60, 'route', {
    role: 'Insert a call_log + write activity + map outcome → lead status (called / voicemail / etc).',
    plain: 'The endpoint that records a phone call you logged. Also bumps the lead\'s status based on the outcome.',
    path: 'app/api/leads/[id]/calls/route.ts',
    notes: ['OUTCOME_TO_STATUS map mirrors the inverse', 'metadata.auto_from_call: true', 'Triggers last_contacted_at denorm'],
    tag: ['leads','all'],
  }),
  N('lead-q-route', 'routes', '/api/leads/[id]/questionnaire', 'GET / POST answers', 540, 580, 220, 60, 'route', {
    role: 'Read + write the intake form answers (custom_fields jsonb on leads).',
    plain: 'Saves your answers to the company intake questions on a lead.',
    path: 'app/api/leads/[id]/questionnaire/route.ts',
    notes: ['Answers stored in leads.custom_fields jsonb', 'Custom questions go through unchanged'],
    tag: ['snapshot','all'],
  }),
  N('bulk-route', 'routes', '/api/leads/bulk', 'PATCH / DELETE many', 540, 660, 220, 60, 'route', {
    role: 'Bulk update or delete — accepts { ids: [] } or { scope: "all_matching", filter: {} }.',
    plain: 'The endpoint used when you select many leads at once and reassign or delete them in one click.',
    path: 'app/api/leads/bulk/route.ts',
    notes: ['"Select All Matching" sends filter spec, not IDs', 'Activity log inserts chunked at 200 rows', 'RPC bulk_update / bulk_delete on backend'],
    tag: ['leads','all'],
  }),
  N('pipeline-search-route', 'routes', '/api/pipeline/search', 'debounced search', 540, 740, 220, 60, 'route', {
    role: 'Server-side pipeline search (q param). Excludes terminal statuses.',
    plain: 'The search box on the pipeline screen — looks across all stages.',
    path: 'app/api/pipeline/search/route.ts',
    notes: ['Returns same shape as the trimmed RPC', '300ms debounce on client'],

const FIXES = {
  // Backlog the user has explicitly named in this session
  'leads-client': [
    { n: 1, t: 'CSV export of ALL matching leads (currently exports only the visible page) — needs a streaming endpoint.' },
  ],
  'leads-list-route': [
    { n: 1, t: 'Companion streaming export endpoint for the "Export All Matching" CSV feature.' },
  ],

    { n: 2, t: 'last_activity_at sort path uses dynamic SQL, no index. If sort gets hot at 50k+ rows, switch to static ORDER BY or add covering index.' },
  ],

    { n: 3, t: 'Delete this file — zero callers across the codebase. Confirmed by grep this session.' },
  ],
  'rate-limit': [
    { n: 4, t: 'If AI usage scales, wrap the /api/ai/snapshot-email route in AI_LIMIT to cap per-user cost exposure.' },
  ],
};
const KNOWN_BUGS = {
  // Nothing the user pointed to a file:line for yet — leaving empty so we honor "no invented bugs."
};

// ── Build feature chips from data ───────────────────────────────────────────
const ALL_TAGS = new Set();
nodes.forEach(n => (n.tag || []).forEach(t => ALL_TAGS.add(t)));
edges.forEach(e => (e.tag || []).forEach(t => ALL_TAGS.add(t)));
const CHIP_ORDER = ['overview','snapshot','leads','pipeline','notes','notifications','analytics','admin','import','dead','all'];
const CHIPS = CHIP_ORDER.filter(t => ALL_TAGS.has(t)).map(t => ({
  id: t,
  label: (
    t === 'all'      ? 'Show all wires'
    : t === 'dead'   ? 'Dead code'
    : t === 'overview' ? 'Overview (default)'
    : t.charAt(0).toUpperCase() + t.slice(1)
  ),
}));

// ── Render clusters + nodes + edges ─────────────────────────────────────────
const root = document.getElementById('root');
const NS = 'http://www.w3.org/2000/svg';
function el(tag, attrs = {}, parent = null) {
  const n = document.createElementNS(NS, tag);
  for (const k in attrs) n.setAttribute(k, attrs[k]);
  if (parent) parent.appendChild(n);
  return n;
}

// Helpers for layout
function nodeById(id) { return nodes.find(n => n.id === id); }
function colorVar(c) {
  return ({
    client:'var(--client)', service:'var(--service)', route:'var(--route)',
    db:'var(--db)', external:'var(--external)', critical:'var(--critical)',
  })[c] || 'var(--text)';
}
function nodeAnchor(node, side) {
  // returns {x,y} for source/target connection
  if (side === 'right') return { x: node.x + node.w, y: node.y + node.h / 2 };
  if (side === 'left')  return { x: node.x,           y: node.y + node.h / 2 };
  return { x: node.x + node.w / 2, y: node.y + node.h / 2 };
}

// Cluster rects
for (const c of clusters) {
  el('rect', { x: c.x, y: c.y, width: c.w, height: c.h, class: 'cluster-rect',
              style: 'fill: rgba(255,255,255,0.018);' }, root);
  el('text', { x: c.x + 12, y: c.y + 24, class: 'cluster-label' }, root).textContent = c.label;
}

// Edges first (so nodes sit on top)
const edgesG = el('g', { id: 'edges' }, root);
const edgeElems = [];
for (const e of edges) {
  const a = nodeById(e.from), b = nodeById(e.to);
  if (!a || !b) { console.warn('missing node for edge', e); continue; }
  const aRight = a.x + a.w <= b.x;       // left-to-right
  const bRight = b.x + b.w <= a.x;       // right-to-left
  let p1, p2;
  if (aRight)      { p1 = nodeAnchor(a, 'right'); p2 = nodeAnchor(b, 'left'); }
  else if (bRight) { p1 = nodeAnchor(a, 'left');  p2 = nodeAnchor(b, 'right'); }
  else             { p1 = nodeAnchor(a, 'right'); p2 = nodeAnchor(b, 'left'); }
  const dx = (p2.x - p1.x);
  const c1x = p1.x + Math.max(40, dx * 0.4);
  const c2x = p2.x - Math.max(40, dx * 0.4);
  const d = `M ${p1.x} ${p1.y} C ${c1x} ${p1.y}, ${c2x} ${p2.y}, ${p2.x} ${p2.y}`;
  const g = el('g', { 'data-edge': `${e.from}::${e.to}`, 'data-from': e.from, 'data-to': e.to,
                       'data-kind': e.kind, 'data-tags': (e.tag||[]).join(',') }, edgesG);
  const path = el('path', {
    d, class: 'edge ' + e.kind,
    'marker-end': 'url(#arrow)',
    style: `color: ${e.kind==='critical' ? 'var(--critical)' :
                     e.kind==='api'      ? 'var(--accent-2)' :
                     e.kind==='db'       ? 'var(--db)' :
                     e.kind==='mount'    ? 'var(--client)' : '#555'};`,
  }, g);
  // label at midpoint, slightly above
  if (e.label) {
    const mx = (p1.x + p2.x) / 2;
    const my = (p1.y + p2.y) / 2 - 6;
    const t = el('text', { x: mx, y: my, 'text-anchor': 'middle', class: 'edge-label' }, g);
    t.textContent = e.label;
  }
  edgeElems.push({ el: g, path, edge: e });
}

// Nodes
const nodeElems = [];
for (const n of nodes) {
  const g = el('g', { 'data-node': n.id, transform: `translate(${n.x} ${n.y})`,
                       style: 'cursor: pointer;' }, root);
  const isDead = (n.tag || []).includes('dead');
  const rect = el('rect', {
    x: 0, y: 0, width: n.w, height: n.h, class: 'node-rect' + (n.critical ? ' critical' : ''),
    style: `stroke: ${colorVar(n.color)};`,
  }, g);
  el('text', { x: 12, y: 22, class: 'node-label' }, g).textContent = n.label;
  if (n.sub) {
    el('text', { x: 12, y: 38, class: 'node-sub' + (isDead ? ' dead' : '') }, g).textContent = n.sub;
  }
  // Badges
  const fixes = FIXES[n.id] || [];
  const bugs  = KNOWN_BUGS[n.id] || [];
  let bx = n.w - 12;
  if (bugs.length) {
    el('circle', { cx: bx - 7, cy: 14, r: 9, class: 'badge-bug' }, g);
    el('text', { x: bx - 7, y: 17.5, 'text-anchor': 'middle', class: 'badge-text' }, g).textContent = bugs.length;
    bx -= 22;
  }
  if (fixes.length) {
    el('circle', { cx: bx - 7, cy: 14, r: 9, class: 'badge-fix' }, g);
    el('text', { x: bx - 7, y: 17.5, 'text-anchor': 'middle', class: 'badge-text' }, g).textContent = fixes.length;
  }
  g.addEventListener('click', (ev) => { ev.stopPropagation(); selectNode(n.id); });
  g.addEventListener('mouseenter', () => showSidebar(n.id, true));
  g.addEventListener('mouseleave', () => { if (selectedId) showSidebar(selectedId, false); else showDefaultSidebar(); });
  nodeElems.push({ el: g, rect, node: n });
}

// ── Chips ───────────────────────────────────────────────────────────────────
let activeChip = 'overview';
const chipsBar = document.getElementById('chips');
for (const c of CHIPS) {
  const btn = document.createElement('button');
  btn.className = 'chip' + (c.id === activeChip ? ' active' : '');
  btn.textContent = c.label;
  btn.dataset.id = c.id;
  btn.addEventListener('click', () => setChip(c.id));
  chipsBar.appendChild(btn);
}
// Roadmap chip
const roadmap = document.createElement('button');
roadmap.className = 'chip';
roadmap.textContent = 'Roadmap & bugs';
roadmap.dataset.id = '__roadmap';
roadmap.addEventListener('click', () => setChip('__roadmap'));
chipsBar.appendChild(roadmap);

function setChip(id) {
  activeChip = id;
  document.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c.dataset.id === id));
  applyFilter();
}

function applyFilter() {
  const isRoadmap = activeChip === '__roadmap';
  const isAll = activeChip === 'all';
  // Nodes
  for (const ne of nodeElems) {
    const tags = ne.node.tag || [];
    let visible;
    if (isRoadmap) {
      visible = (FIXES[ne.node.id] || []).length > 0 || (KNOWN_BUGS[ne.node.id] || []).length > 0;
    } else if (isAll) {
      visible = true;
    } else {
      visible = tags.includes(activeChip);
    }
    ne.el.style.opacity = visible ? 1 : 0.18;
    ne.rect.classList.toggle('dimmed', !visible);
  }
  // Edges
  for (const ee of edgeElems) {
    const tags = ee.edge.tag || [];
    let visible;
    if (isRoadmap) {
      const f = nodeById(ee.edge.from), t = nodeById(ee.edge.to);
      visible = (FIXES[f.id] || KNOWN_BUGS[f.id] || FIXES[t.id] || KNOWN_BUGS[t.id]) ? true : false;
    } else if (isAll) {
      visible = true;
    } else {
      visible = tags.includes(activeChip);
    }
    ee.el.style.opacity = visible ? 1 : 0.05;
  }
}

// ── Selection & sidebar ─────────────────────────────────────────────────────
let selectedId = null;
function selectNode(id) {
  selectedId = id;
  // dim everything not connected
  const connected = new Set([id]);
  for (const e of edges) {
    if (e.from === id) connected.add(e.to);
    if (e.to   === id) connected.add(e.from);
  }
  for (const ne of nodeElems) {
    const on = connected.has(ne.node.id);
    ne.el.classList.toggle('dimmed-group', !on);
    ne.rect.classList.toggle('selected', ne.node.id === id);
    ne.rect.classList.toggle('dimmed', !on);
  }
  for (const ee of edgeElems) {
    const on = ee.edge.from === id || ee.edge.to === id;
    ee.path.classList.toggle('highlight', on);
    ee.el.classList.toggle('dimmed', !on);
  }
  showSidebar(id, false);
}
function clearSelection() {
  selectedId = null;
  for (const ne of nodeElems) { ne.rect.classList.remove('selected','dimmed'); }
  for (const ee of edgeElems) { ee.path.classList.remove('highlight'); ee.el.classList.remove('dimmed'); }
  applyFilter();
  showDefaultSidebar();
}

document.getElementById('canvas-wrap').addEventListener('click', (ev) => {
  if (ev.target.id === 'graph' || ev.target.tagName === 'svg' || ev.target.classList.contains('cluster-rect')) {
    clearSelection();
  }
});

// ── Sidebar rendering ───────────────────────────────────────────────────────
const sidebar = document.getElementById('sidebar');

function showDefaultSidebar() {
  sidebar.innerHTML = `
    <h2>SummitCRM map</h2>
    <p class="plain">Hover any node for details. Click to select + dim unconnected nodes. Click empty canvas to clear. The default view is the AI snapshot critical path — the spine of the app from "click Email Snapshot" → ChatGPT → Outlook draft.</p>

    <div id="findings">
      <div class="section-title">Notable findings from this map</div>
      <ul>
        <li><b>Critical path is the AI snapshot:</b> 10 numbered edges from the questionnaire button → OpenAI → logged in <code>ai_usage_logs</code> → Outlook compose. It's the only LLM task in the codebase and the most distinctive feature surface.</li>
        <li><b>Dead code:</b> <code>lib/notifications/create.ts</code> exports <code>createNotification</code> + <code>notifyAdmins</code> with zero live callers — every real notification insert in the app is inline. Safe to delete. (<code>formatPercent</code> and <code>slugify</code> in <code>lib/utils</code> are also exported but unused.)</li>
        <li><b>Schema cleanup this session:</b> notification_type enum trimmed from 9 → 3 active types, <code>email_digest</code> column dropped, <code>FollowUpBell</code> component deleted (214 lines), <code>get_workspace_leads_json</code> RPC backfilled into the migrations folder so a fresh-DB rebuild reproduces it.</li>
        <li><b>RPC-driven reads:</b> <code>/leads</code>, <code>/pipeline</code>, and 4 analytics charts each fire a single jsonb-returning RPC instead of multiple round-trips. The leads RPC is marked <code>VOLATILE</code> because it builds a temp table.</li>
        <li><b>Notifications realtime is fragile:</b> works because the table is explicitly in the <code>supabase_realtime</code> publication (migration 20260512000014). New tables don't get added automatically — easy to forget.</li>
        <li><b>Backlog:</b> #2 CSV export of "all matching" still ships only the visible page. #4 a fresh-DB rebuild now works because of the RPC migration backfill. Rate-limit library exists but is unwired (user opted out).</li>
      </ul>
    </div>

    <div class="section-title">Legend</div>
    <ul>
      <li><b>Blue</b> · client (browser-side)</li>
      <li><b>Purple</b> · server lib / service</li>
      <li><b>Green</b> · API route</li>
      <li><b>Amber</b> · database (table or RPC)</li>
      <li><b>Pink</b> · external service</li>
      <li><b>Red edges</b> · critical path (snapshot flow)</li>
      <li><b>Green badge</b> · open fix on that node</li>
    </ul>
  `;
}

function showSidebar(id, isHover) {
  const n = nodeById(id);
  if (!n) return;
  const ins  = edges.filter(e => e.to   === id);
  const outs = edges.filter(e => e.from === id);
  const fixes = FIXES[id] || [];
  const bugs  = KNOWN_BUGS[id] || [];
  const tagHtml = (n.tag || []).map(t => `<span class="tag">${t}</span>`).join('');
  sidebar.innerHTML = `
    <h2>${n.label}${n.sub ? ' <span class="muted">· ' + n.sub + '</span>' : ''}</h2>
    <div class="path">${n.path || ''}</div>
    <p class="role"><b>What it does:</b> ${n.role || ''}</p>
    <p class="plain"><b>In plain English:</b> ${n.plain || ''}</p>
    ${n.notes && n.notes.length ? `<div class="section-title">Notes</div><ul>${n.notes.map(x => `<li>${x}</li>`).join('')}</ul>` : ''}
    ${ins.length ? `<div class="section-title">Incoming</div>${ins.map(e => `<div class="edge-line"><span class="muted">${e.from}</span><span class="arr">→</span><span class="what">${e.label || e.kind}</span></div>`).join('')}` : ''}
    ${outs.length ? `<div class="section-title">Outgoing</div>${outs.map(e => `<div class="edge-line"><span class="what">${e.label || e.kind}</span><span class="arr">→</span><span class="muted">${e.to}</span></div>`).join('')}` : ''}
    ${fixes.length ? `<div class="section-title">Fixes (${fixes.length})</div>${fixes.map(f => `<div class="fix"><b>#${f.n}</b> · ${f.t}</div>`).join('')}` : ''}
    ${bugs.length ? `<div class="section-title">Bugs (${bugs.length})</div>${bugs.map(b => `<div class="bug"><span class="sev">${b.sev}</span>${b.ref ? '<code>' + b.ref + '</code> — ' : ''}${b.t}</div>`).join('')}` : ''}
    <div class="tag-row">${tagHtml}</div>
  `;
}

// ── Zoom (scrolling is native) ──────────────────────────────────────────────
// The canvas lives inside #scroll-area which is overflow:auto. Native scroll
// bars handle pan up/down/left/right. Zoom buttons resize the SVG element
// itself; the scroll container adjusts its scroll range accordingly.
const svg = document.getElementById('graph');
const scrollArea = document.getElementById('scroll-area');
const BASE_W = 1720, BASE_H = 1480;
let scale = 1;
function applyScale() {
  svg.setAttribute('width',  BASE_W * scale);
  svg.setAttribute('height', BASE_H * scale);
}
function fitToViewport() {
  const sx = scrollArea.clientWidth  / BASE_W;
  const sy = scrollArea.clientHeight / BASE_H;
  scale = Math.min(sx, sy);
  applyScale();
  scrollArea.scrollLeft = 0;
  scrollArea.scrollTop  = 0;
}
document.getElementById('fit-btn').addEventListener('click', fitToViewport);
document.getElementById('reset').addEventListener('click', () => { scale = 1; applyScale(); });
document.getElementById('zoom-in').addEventListener('click', () => {
  scale = Math.min(3, scale * 1.2); applyScale();
});
document.getElementById('zoom-out').addEventListener('click', () => {
  scale = Math.max(0.3, scale / 1.2); applyScale();
});

// Cmd/Ctrl + wheel zooms (anchored to cursor); plain wheel scrolls natively.
scrollArea.addEventListener('wheel', (ev) => {
  if (!(ev.metaKey || ev.ctrlKey)) return;  // let native scroll happen
  ev.preventDefault();
  const rect = scrollArea.getBoundingClientRect();
  const cx = ev.clientX - rect.left + scrollArea.scrollLeft;
  const cy = ev.clientY - rect.top  + scrollArea.scrollTop;
  const k = ev.deltaY > 0 ? 1/1.12 : 1.12;
  const newScale = Math.max(0.3, Math.min(3, scale * k));
  const ratio = newScale / scale;
  scale = newScale;
  applyScale();
  scrollArea.scrollLeft = cx * ratio - (ev.clientX - rect.left);
  scrollArea.scrollTop  = cy * ratio - (ev.clientY - rect.top);
}, { passive: false });

// ── Initial render ──────────────────────────────────────────────────────────
applyFilter();
showDefaultSidebar();
</script>
